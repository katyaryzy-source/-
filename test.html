// ============== ОТОБРАЖЕНИЕ И ПРОВЕРКА ==============
var totalQuestions = questions.length;
document.getElementById('totalCount').textContent = totalQuestions;

function renderTest() {
    var html = '';
    for (var i = 0; i < questions.length; i++) {
        var q = questions[i];
        var type = q.correct.length > 1 ? 'checkbox' : 'radio';
        html += '<div class="question">';
        html += '<b>' + (i+1) + '. ' + q.question + '</b>';
        html += '<div class="options">';
        var letters = 'abcdefghijklmnopqrstuvwxyz';
        for (var j = 0; j < q.opts.length; j++) {
            html += '<label><input type="' + type + '" name="q' + i + '" value="' + letters[j] + '"> ' + letters[j] + '. ' + q.opts[j] + '</label>';
        }
        html += '</div>';
        html += '<div class="feedback" id="fb' + i + '"></div>';
        html += '</div>';
    }
    document.getElementById('testArea').innerHTML = html;
}

function checkTest() {
    var correctCount = 0;
    for (var i = 0; i < questions.length; i++) {
        var q = questions[i];
        var fb = document.getElementById('fb' + i);
        var inputs = document.querySelectorAll('input[name="q' + i + '"]:checked');
        var selected = [];
        inputs.forEach(function(inp) { selected.push(inp.value); });
        var isCorrect = selected.length === q.correct.length && selected.every(function(v) { return q.correct.includes(v); });
        if (isCorrect) correctCount++;
        fb.innerHTML = isCorrect ? '✅ Правильно' : '❌ Неправильно. Ответ: ' + q.correct.join(', ');
        var labels = document.querySelectorAll('input[name="q' + i + '"]');
        labels.forEach(function(inp) {
            var parent = inp.parentElement;
            parent.classList.remove('correct', 'wrong');
            if (q.correct.includes(inp.value)) parent.classList.add('correct');
            else if (selected.includes(inp.value) && !q.correct.includes(inp.value)) parent.classList.add('wrong');
        });
    }
    var pct = Math.round(correctCount / questions.length * 100);
    document.getElementById('result').innerHTML = '🎯 Результат: ' + correctCount + ' из ' + questions.length + ' (' + pct + '%)';
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('stats').textContent = 'Правильных ответов: ' + correctCount + ' | Неправильных: ' + (questions.length - correctCount);
}

function resetTest() {
    var inputs = document.querySelectorAll('input[type="radio"], input[type="checkbox"]');
    inputs.forEach(function(inp) { inp.checked = false; });
    for (var i = 0; i < questions.length; i++) {
        document.getElementById('fb' + i).innerHTML = '';
        var labels = document.querySelectorAll('input[name="q' + i + '"]');
        labels.forEach(function(inp) {
            inp.parentElement.classList.remove('correct', 'wrong');
        });
    }
    document.getElementById('result').innerHTML = '';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('stats').textContent = '';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Инициализация
renderTest();
